name = "gauntletci-license-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# Non-secret config -- edit these after creating Payment Links in Stripe dashboard.
# Find price IDs at: https://dashboard.stripe.com/products
PRICE_ID_PRO      = "price_REPLACE_ME_PRO"
PRICE_ID_TEAMS    = "price_REPLACE_ME_TEAMS"
PRICE_ID_ENTERPRISE = "price_REPLACE_ME_ENTERPRISE"

FROM_EMAIL = "licenses@gauntletci.com"
REPLY_TO   = "support@gauntletci.com"

# Secrets -- set via: wrangler secret put <NAME>
# Required secrets (never commit these):
#   STRIPE_WEBHOOK_SECRET   -- from Stripe Dashboard > Webhooks > signing secret
#   GAUNTLETCI_PRIVATE_KEY  -- contents of gauntletci-signing.key (PEM, RS256)
#   RESEND_API_KEY          -- from https://resend.com/api-keys
