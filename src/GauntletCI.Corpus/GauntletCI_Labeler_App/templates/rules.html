{% extends 'layout.html' %}
{% block content %}
<section class="panel">
  <h1>Rules</h1>
  <table class="data-table">
    <thead><tr><th>Rule</th><th>Tier</th><th>Trigger Rate</th><th>Fired</th><th>Labeled</th><th></th></tr></thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ row.rule_id }}</td>
        <td>{{ row.tier }}</td>
        <td>{{ row.trigger_rate|pct }}</td>
        <td>{{ row.total_fired }}</td>
        <td>{{ row.total_labels }}</td>
        <td><a class="button secondary" href="{{ url_for('rule_detail', rule_id=row.rule_id) }}">Open</a></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
