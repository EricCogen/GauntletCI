<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GauntletCI Labeler</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand"><a href="{{ url_for('dashboard') }}">GauntletCI Labeler</a></div>
    <nav>
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('queue') }}">Queue</a>
      <a href="{{ url_for('rules') }}">Rules</a>
      <a href="{{ url_for('evaluations') }}">Evaluations</a>
      <a href="{{ url_for('audit') }}">Audit</a>
    </nav>
  </header>
  <main class="page">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-stack">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
