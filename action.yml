name: "GauntletCI - Validate Code Changes Before Review"
description: "Deterministic pre-commit risk detection for pull requests. Analyzes your git diff and posts findings as annotations."
author: "Eric Cogen"

branding:
  icon: "shield"
  color: "blue"

inputs:
  commit:
    description: "Commit SHA to analyse. Defaults to the PR head commit."
    required: false
    default: ""
  no-llm:
    description: "Disable LLM enrichment and run deterministic rules only."
    required: false
    default: "true"
  fail-on-findings:
    description: "When true (default), pass through GauntletCI's exit code. Block-severity findings fail by default (exitOn: Block); set exitOn to Warn in .gauntletci.json to also fail on warnings."
    required: false
    default: "true"
  inline-comments:
    description: "Post findings as inline GitHub PR review comments. Requires pull-requests: write in the calling workflow."
    required: false
    default: "false"
  sensitivity:
    description: "Confidence-based noise filter: strict (Block+High/Medium only), balanced (default), or permissive (all Block+Warn)."
    required: false
    default: "balanced"
  ascii:
    description: "Use ASCII-only output (recommended for CI logs)."
    required: false
    default: "true"
  dotnet-version:
    description: "The .NET version to use."
    required: false
    default: "8.0.x"
  gauntletci-version:
    description: "The GauntletCI NuGet tool version to install."
    required: false
    default: "2.8.0"

outputs:
  findings-count:
    description: "Number of findings produced."
    value: ${{ steps.run.outputs.findings-count }}

runs:
  using: "composite"
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Install GauntletCI
      shell: bash
      run: dotnet tool install -g GauntletCI --version ${{ inputs.gauntletci-version }}

    - name: Run GauntletCI
      id: run
      shell: bash
      env:
        GAUNTLETCI_NO_BANNER: "1"
        GAUNTLETCI_PR_NUMBER: ${{ github.event.pull_request.number }}
        GAUNTLETCI_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      run: |
        set +e
        COMMIT="${{ inputs.commit }}"
        [ -z "$COMMIT" ] && COMMIT="${{ github.event.pull_request.head.sha || github.sha }}"
        args="analyze --commit $COMMIT --output json --no-banner"
        [ "${{ inputs.no-llm }}" = "true" ] && args="$args --no-llm"
        [ "${{ inputs.ascii }}" = "true" ]  && args="$args --ascii"
        [ "${{ inputs.inline-comments }}" = "true" ] && args="$args --github-pr-comments"
        [ -n "${{ inputs.sensitivity }}" ] && args="$args --sensitivity ${{ inputs.sensitivity }}"
        JSONFILE=$(mktemp)
        ERRFILE=$(mktemp)
        gauntletci $args > "$JSONFILE" 2> "$ERRFILE"
        EXIT_CODE=$?
        cat "$ERRFILE" >&2
        FINDINGS=0
        if command -v jq >/dev/null 2>&1 && jq -e . "$JSONFILE" >/dev/null 2>&1; then
          FINDINGS=$(jq -r '(.Findings // []) | length' "$JSONFILE")
          if [ "$FINDINGS" -gt 0 ]; then
            echo "GauntletCI found $FINDINGS issue(s):"
            jq -r '.Findings[] | "  • [\(.RuleId)] \(.Summary)"' "$JSONFILE"
          else
            echo "GauntletCI found no issues."
          fi
        elif command -v python3 >/dev/null 2>&1; then
          FINDINGS=$(python3 -c "import json; print(len(json.load(open('$JSONFILE')).get('Findings', [])))" 2>/dev/null || echo 0)
          cat "$JSONFILE"
        else
          cat "$JSONFILE"
          FINDINGS=$(grep -cE '"RuleId"' "$JSONFILE" 2>/dev/null || true)
        fi
        FINDINGS="${FINDINGS:-0}"
        rm -f "$JSONFILE" "$ERRFILE"
        echo "findings-count=$FINDINGS" >> "$GITHUB_OUTPUT"
        [ "${{ inputs.fail-on-findings }}" = "true" ] && exit $EXIT_CODE
        exit 0
