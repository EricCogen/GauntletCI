name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without leading v)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$version" ]; then
            echo "Version was empty." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore GauntletCI.slnx

      - name: Build
        run: dotnet build GauntletCI.slnx --no-restore --configuration Release

      - name: Test
        env:
          GAUNTLETCI_E2E_STRICT: "1"
        run: dotnet test GauntletCI.slnx --no-build --configuration Release --verbosity normal

      - name: Pack tool
        run: dotnet pack src/GauntletCI.Cli/GauntletCI.Cli.csproj --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.version }} --output artifacts/release

      - name: Publish self-contained binaries
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          RIDS=(win-x64 win-arm64 osx-x64 osx-arm64 linux-x64 linux-arm64)
          for rid in "${RIDS[@]}"; do
            dotnet publish src/GauntletCI.Cli/GauntletCI.Cli.csproj \
              --configuration Release \
              --self-contained true \
              --runtime "$rid" \
              -p:PackageVersion="$VERSION" \
              -p:PublishSingleFile=true \
              -p:EnableCompressionInSingleFile=true \
              --output "artifacts/binaries/$rid"
          done

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/packages
          VERSION="${{ steps.version.outputs.version }}"

          # Windows - zip
          for arch in x64 arm64; do
            rid="win-$arch"
            cd "artifacts/binaries/$rid"
            zip "../../../artifacts/packages/gauntletci-$rid-$VERSION.zip" gauntletci.exe
            cd ../../..
          done

          # macOS - tar.gz
          for arch in x64 arm64; do
            rid="osx-$arch"
            cd "artifacts/binaries/$rid"
            tar -czf "../../../artifacts/packages/gauntletci-$rid-$VERSION.tar.gz" gauntletci
            cd ../../..
          done

          # Linux - tar.gz
          for arch in x64 arm64; do
            rid="linux-$arch"
            cd "artifacts/binaries/$rid"
            tar -czf "../../../artifacts/packages/gauntletci-$rid-$VERSION.tar.gz" gauntletci
            cd ../../..
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts/packages
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          # Optional RELEASE_PAT (repo contents:write) so release:published
          # triggers standalone Homebrew/winget workflows. Falls back to GITHUB_TOKEN.
          token: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || github.token }}
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/release/*.nupkg
            artifacts/packages/*.zip
            artifacts/packages/*.tar.gz
            artifacts/packages/checksums.txt

      - name: Upload release checksums
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: artifacts/packages/checksums.txt
          retention-days: 1

      - name: Push to NuGet.org
        if: ${{ vars.NUGET_PUSH_ENABLED == 'true' }}
        run: dotnet nuget push artifacts/release/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    if: vars.HOMEBREW_TAP_ENABLED == 'true'
    steps:
      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: release-checksums
          path: .

      - name: Checkout GauntletCI update script
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          path: gauntletci-src
          sparse-checkout: scripts/update-homebrew-tap-formula.py
          sparse-checkout-cone-mode: false

      - name: Checkout tap repo
        uses: actions/checkout@v6
        with:
          repository: EricCogen/homebrew-gauntletci
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          python3 ../gauntletci-src/scripts/update-homebrew-tap-formula.py \
            ../checksums.txt Formula/gauntletci.rb "${{ needs.release.outputs.version }}"
        working-directory: homebrew-tap

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gauntletci.rb
          git diff --cached --quiet || \
            git commit -m "Update GauntletCI formula to v${{ needs.release.outputs.version }}"
          git push

  submit-winget:
    needs: release
    runs-on: windows-latest
    # Set WINGET_SUBMIT_ENABLED=true after microsoft/winget-pkgs#388209 merges and WINGET_TOKEN is configured.
    if: vars.WINGET_SUBMIT_ENABLED == 'true'
    continue-on-error: true
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: EricCogen.GauntletCI
          installers-regex: '^gauntletci-win-(x64|arm64)-.*\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}
