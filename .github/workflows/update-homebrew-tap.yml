name: Update Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v (e.g. 2.8.0)"
        required: true
        type: string

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download checksums
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          curl -fsSL \
            "https://github.com/EricCogen/GauntletCI/releases/download/v${VERSION}/checksums.txt" \
            -o checksums.txt
          cat checksums.txt

      - name: Checkout GauntletCI update script
        uses: actions/checkout@v7
        with:
          repository: EricCogen/GauntletCI
          ref: main
          path: gauntletci-src
          sparse-checkout: scripts/update-homebrew-tap-formula.py
          sparse-checkout-cone-mode: false

      - name: Checkout tap repo
        uses: actions/checkout@v7
        with:
          repository: EricCogen/homebrew-gauntletci
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          python3 ../gauntletci-src/scripts/update-homebrew-tap-formula.py \
            ../checksums.txt Formula/gauntletci.rb "${{ steps.ver.outputs.version }}"
        working-directory: homebrew-tap

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gauntletci.rb
          git diff --cached --quiet || \
            git commit -m "Update GauntletCI formula to v${{ steps.ver.outputs.version }}"
          git push
