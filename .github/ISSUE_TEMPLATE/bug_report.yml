name: Bug report
description: Report a crash, incorrect CLI behavior, install issue, or workflow failure.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking time to file this bug. Please provide a minimal reproduction so maintainers can verify quickly.

  - type: input
    id: version
    attributes:
      label: GauntletCI version
      placeholder: gauntletci --version
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Windows
        - macOS
        - Linux
        - GitHub Actions
        - Other CI
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the command you ran.
      render: bash
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Output or error
      description: Paste the relevant output.
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
