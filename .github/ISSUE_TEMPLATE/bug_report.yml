name: Bug report
description: Report a defect in GauntletCI behavior.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking time to file this bug. Please provide a minimal reproduction so maintainers can verify quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Describe the issue in 1-3 sentences.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened in reality?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Include the smallest diff/config/command sequence that reproduces the issue.
      render: markdown
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: GauntletCI version
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, .NET SDK version, shell, and CI context if applicable.
      placeholder: e.g., Windows 11, .NET SDK 8.0.204, PowerShell 7.4
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or output (optional)
      description: Paste relevant output or error messages.
      render: text
